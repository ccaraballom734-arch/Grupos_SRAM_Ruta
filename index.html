<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget de Soporte Técnico</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  /* Variables para inyectar en cualquier web sin afectar su estilo global */
  :root {
    /* Paleta Corporativa */
    --support-bg-panel: #1e1e20; /* Gris carbón profundo - Base */
    --support-bg-header: #27272a; /* Gris carbón - Secundario */
    --support-border: #333338;
    
    /* Acentos Naranja */
    --support-accent: #ff6b35; 
    --support-accent-hover: #e55c2a;
    --support-glow: rgba(255, 107, 53, 0.3);
    
    /* Textos y Burbujas */
    --support-text-main: #f4f4f5;
    --support-text-muted: #a1a1aa;
    --support-bubble-user: rgba(255, 107, 53, 0.12);
    --support-bubble-bot: #2c2c30;
    --support-bubble-error: rgba(220, 38, 38, 0.15);
    
    --support-radius: 16px;
    --support-font: 'Poppins', sans-serif;
  }

  /* Reset local para el widget */
  .support-widget-wrapper * { 
    box-sizing: border-box; 
    font-family: var(--support-font);
  }

  /* Botón Flotante (Launcher) */
  .support-launcher {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--support-accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 24px var(--support-glow);
    z-index: 999999;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: none;
    outline: none;
  }
  .support-launcher:hover { transform: scale(1.08); }

  /* Contenedor Principal del Chat */
  .support-chat-container {
    position: fixed;
    bottom: 100px; /* Sobre el launcher */
    right: 24px;
    width: 360px; 
    height: 550px;
    max-height: calc(100vh - 120px);
    background: var(--support-bg-panel);
    border: 1px solid var(--support-border);
    border-radius: 20px; 
    display: none; /* Oculto por defecto, controlado por JS */
    flex-direction: column; 
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    z-index: 999998;
    color: var(--support-text-main);
  }

  /* Header */
  .support-header {
    padding: 16px 20px; 
    display: flex; 
    align-items: center; 
    gap: 14px;
    background: var(--support-bg-header);
    border-bottom: 1px solid var(--support-border);
  }
  .support-avatar {
    width: 42px; 
    height: 42px; 
    border-radius: 12px;
    background: var(--support-bubble-user);
    display: flex; 
    align-items: center; 
    justify-content: center; 
    color: var(--support-accent);
  }
  .support-header-info { flex: 1; }
  .support-header-info h1 { 
    font-size: 15px; 
    margin: 0 0 2px 0; 
    font-weight: 600; 
  }
  .support-status {
    font-size: 11px; 
    color: var(--support-text-muted); 
    display: flex; 
    align-items: center; 
    gap: 6px; 
  }
  .support-status-dot {
    width: 6px; 
    height: 6px; 
    border-radius: 50%; 
    background: var(--support-accent); 
  }
  .support-close-btn {
    background: transparent;
    border: none;
    color: var(--support-text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    display: flex;
    transition: background 0.2s, color 0.2s;
  }
  .support-close-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  /* Área de Mensajes */
  .support-messages {
    flex: 1; 
    overflow-y: auto; 
    padding: 20px; 
    display: flex; 
    flex-direction: column; 
    gap: 16px;
  }
  .support-messages::-webkit-scrollbar { width: 5px; }
  .support-messages::-webkit-scrollbar-track { background: transparent; }
  .support-messages::-webkit-scrollbar-thumb { background: var(--support-border); border-radius: 10px; }

  .support-msg-wrapper {
    display: flex;
    gap: 10px;
    max-width: 88%;
  }
  .support-msg-wrapper.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .support-msg-wrapper.bot { align-self: flex-start; }

  .support-bubble-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--support-text-muted);
    background: var(--support-bg-header);
  }
  .support-msg-wrapper.user .support-bubble-icon {
    color: var(--support-accent);
    background: var(--support-bubble-user);
  }

  .support-bubble {
    padding: 12px 16px; 
    border-radius: var(--support-radius);
    line-height: 1.5; 
    font-size: 13px; 
    white-space: pre-wrap; 
    word-wrap: break-word; 
  }
  .support-msg-wrapper.user .support-bubble {
    background: var(--support-bubble-user); 
    color: var(--support-text-main);
    border: 1px solid rgba(255, 107, 53, 0.2);
    border-top-right-radius: 4px;
  }
  .support-msg-wrapper.bot .support-bubble {
    background: var(--support-bubble-bot); 
    border: 1px solid var(--support-border);
    border-top-left-radius: 4px;
  }
  .support-msg-wrapper.error .support-bubble {
    background: var(--support-bubble-error); 
    color: #fca5a5;
    border: 1px solid rgba(220, 38, 38, 0.3);
    border-top-left-radius: 4px;
  }

  /* Input Area */
  .support-input-area {
    padding: 16px; 
    background: var(--support-bg-header); 
    border-top: 1px solid var(--support-border);
  }
  .support-form {
    display: flex; 
    gap: 8px; 
  }
  .support-form input {
    flex: 1; 
    background: var(--support-bg-panel); 
    border: 1px solid var(--support-border); 
    color: var(--support-text-main);
    border-radius: 12px; 
    padding: 12px 16px; 
    font-size: 13px; 
    outline: none; 
    transition: all 0.3s ease;
  }
  .support-form input:focus {
    border-color: var(--support-accent); 
  }
  .support-form input::placeholder { color: var(--support-text-muted); }
  
  .support-form button {
    width: 44px; 
    height: 44px; 
    border: none; 
    border-radius: 12px; 
    background: var(--support-accent);
    color: #fff; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    transition: background 0.3s ease;
  }
  .support-form button:hover { background: var(--support-accent-hover); }
  .support-form button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Dots Animados */
  .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--support-text-muted); display: inline-block; margin: 0 2px;}
</style>
</head>
<body>

  <div class="support-widget-wrapper">
    
    <button class="support-launcher" id="support-launcher" aria-label="Abrir soporte">
      <i data-lucide="message-circle" width="28" height="28"></i>
    </button>

    <div class="support-chat-container" id="support-chat">
      <div class="support-header">
        <div class="support-avatar">
          <i data-lucide="life-buoy" width="22" height="22"></i>
        </div>
        <div class="support-header-info">
          <h1>Soporte Técnico</h1>
          <div class="support-status">
            <span class="support-status-dot" id="support-pulse"></span>
            En línea, listo para ayudar
          </div>
        </div>
        <button class="support-close-btn" id="support-close" aria-label="Cerrar chat">
          <i data-lucide="x" width="20" height="20"></i>
        </button>
      </div>

      <div class="support-messages" id="support-messages">
        <div class="support-msg-wrapper bot">
          <div class="support-bubble-icon"><i data-lucide="headphones" width="16" height="16"></i></div>
          <div class="support-bubble">¡Hola! Bienvenido a soporte técnico. 👋\n\nPor favor, descríbeme el problema que estás experimentando o la duda que tienes para ayudarte a resolverlo.</div>
        </div>
      </div>

      <div class="support-input-area">
        <form class="support-form" id="support-form">
          <input type="text" id="support-input" placeholder="Escribe tu consulta aquí..." autocomplete="off" required>
          <button type="submit" id="support-send" aria-label="Enviar mensaje">
            <i data-lucide="send" width="18" height="18" style="margin-left: 2px;"></i>
          </button>
        </form>
      </div>
    </div>

  </div>

<script>
  // Inicializar íconos Lucide
  lucide.createIcons();

  // ✏️ EDITAR: Tu Webhook de Make
  const WEBHOOK_URL = "https://hook.us1.make.com/TU_IDENTIFICADOR_AQUI";

  /* --- Lógica del Widget Flotante --- */
  const launcher = document.getElementById("support-launcher");
  const chatContainer = document.getElementById("support-chat");
  const closeBtn = document.getElementById("support-close");
  const launcherIcon = launcher.querySelector('i');
  let isChatOpen = false;

  // Animar el pulso de estado
  gsap.to("#support-pulse", {
    boxShadow: "0 0 0 4px rgba(255, 107, 53, 0)",
    duration: 1.5, repeat: -1, ease: "power1.out"
  });

  function toggleChat() {
    if (!isChatOpen) {
      // Abrir chat
      chatContainer.style.display = "flex";
      gsap.fromTo(chatContainer, 
        { opacity: 0, y: 30, scale: 0.9 }, 
        { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "back.out(1.1)" }
      );
      // Cambiar icono del launcher a X
      launcher.innerHTML = '<i data-lucide="chevron-down" width="28" height="28"></i>';
      lucide.createIcons({ root: launcher });
    } else {
      // Cerrar chat
      gsap.to(chatContainer, {
        opacity: 0, y: 30, scale: 0.9, duration: 0.3, ease: "power2.in",
        onComplete: () => { chatContainer.style.display = "none"; }
      });
      // Restaurar icono original
      launcher.innerHTML = '<i data-lucide="message-circle" width="28" height="28"></i>';
      lucide.createIcons({ root: launcher });
    }
    isChatOpen = !isChatOpen;
  }

  launcher.addEventListener("click", toggleChat);
  closeBtn.addEventListener("click", toggleChat);

  /* --- Lógica de Mensajería --- */
  const domMessages = document.getElementById("support-messages");
  const form = document.getElementById("support-form");
  const inputField = document.getElementById("support-input");
  const sendBtn = document.getElementById("support-send");

  function appendMessage(text, sender) {
    const wrapper = document.createElement("div");
    wrapper.className = `support-msg-wrapper ${sender}`;

    const iconDiv = document.createElement("div");
    iconDiv.className = "support-bubble-icon";
    const iconName = sender === "user" ? "user" : (sender === "error" ? "alert-circle" : "headphones");
    iconDiv.innerHTML = `<i data-lucide="${iconName}" width="16" height="16"></i>`;

    const bubble = document.createElement("div");
    bubble.className = "support-bubble";
    bubble.textContent = text;

    wrapper.appendChild(iconDiv);
    wrapper.appendChild(bubble);
    domMessages.appendChild(wrapper);
    lucide.createIcons({ root: wrapper });

    domMessages.scrollTo({ top: domMessages.scrollHeight, behavior: 'smooth' });

    gsap.fromTo(wrapper, 
      { opacity: 0, y: 15 }, 
      { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" }
    );
    return wrapper;
  }

  function showTyping() {
    const wrapper = document.createElement("div");
    wrapper.className = "support-msg-wrapper bot";
    wrapper.id = "support-typing";
    
    wrapper.innerHTML = `
      <div class="support-bubble-icon"><i data-lucide="loader" width="16" height="16"></i></div>
      <div class="support-bubble" style="padding: 14px 16px;">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
      </div>
    `;
    domMessages.appendChild(wrapper);
    lucide.createIcons({ root: wrapper });
    domMessages.scrollTo({ top: domMessages.scrollHeight, behavior: 'smooth' });

    const loaderIcon = wrapper.querySelector('svg');
    gsap.to(loaderIcon, { rotation: 360, duration: 1.5, repeat: -1, ease: "linear" });

    const dots = wrapper.querySelectorAll(".typing-dot");
    gsap.to(dots, { y: -4, opacity: 0.5, duration: 0.4, repeat: -1, yoyo: true, stagger: 0.15 });

    return wrapper;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const message = inputField.value.trim();
    if (!message) return;

    appendMessage(message, "user");
    inputField.value = "";
    sendBtn.disabled = true;

    const loadingIndicator = showTyping();

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
           mensaje: message,
           origen: "soporte_web" // Metadata extra útil para Make
        })
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const aiResponseText = await response.text();

      loadingIndicator.remove();
      appendMessage(aiResponseText, "bot");

    } catch (error) {
      loadingIndicator.remove();
      appendMessage("Lo siento, no pudimos procesar tu solicitud. Por favor, intenta de nuevo.", "error");
    } finally {
      sendBtn.disabled = false;
      inputField.focus();
    }
  });
</script>
</body>
</html>
